name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and upload assets for"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-2022
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      OBS_VERSION: "32.1.2"
      OBS_DEPS_DATE: "2025-08-23"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Verify Visual Studio 2022
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found on the runner."
          }

          $vsPath = & $vswhere -latest -products * -version "[17.0,18.0)" -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio 2022 with MSVC x64 tools was not found on the runner."
          }

          Write-Host "Using Visual Studio 2022 at: $vsPath"
          cmake --version

          $iscc = Get-Command iscc -ErrorAction SilentlyContinue
          if (-not $iscc) {
            $iscc = @(
              "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
            ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          }

          if (-not $iscc) {
            throw "ISCC.exe was not found on the runner."
          }

          Write-Host "Using Inno Setup compiler at: $iscc"

      - name: Restore OBS development cache
        id: obs-dev-cache
        uses: actions/cache@v4
        with:
          path: |
            C:\obs-dev\obs-prefix
            C:\obs-dev\obs-studio-${{ env.OBS_VERSION }}\.deps
          key: obs-development-${{ runner.os }}-${{ runner.arch }}-vs2022-${{ env.OBS_VERSION }}-deps-${{ env.OBS_DEPS_DATE }}-relwithdebinfo-v1

      - name: Checkout OBS Studio
        if: steps.obs-dev-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone --recursive --branch "${env:OBS_VERSION}" https://github.com/obsproject/obs-studio.git "C:\obs-dev\obs-studio-${env:OBS_VERSION}"

      - name: Build OBS development prefix
        if: steps.obs-dev-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cd "C:\obs-dev\obs-studio-${env:OBS_VERSION}"
          cmake --preset windows-x64 -DCMAKE_INSTALL_PREFIX=C:/obs-dev/obs-prefix
          cmake --build --preset windows-x64 --config RelWithDebInfo --target libobs obs-frontend-api --parallel
          cmake --install build_x64 --prefix C:\obs-dev\obs-prefix --config RelWithDebInfo --component Development

      - name: Package plugin
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1

      - name: Upload release packages
        uses: actions/upload-artifact@v7
        with:
          name: obs-lan-preview-${{ env.RELEASE_TAG }}-windows-x64
          path: release/packages/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Generate release notes
        shell: pwsh
        run: |
          .\scripts\generate-release-notes.ps1 -Tag "${env:RELEASE_TAG}" -Repository "${{ github.repository }}" -OutputPath release\release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release/release-notes.md
          files: |
            release/packages/obs-preview-plugin.windows-x64-installer.zip
            release/packages/obs-preview-plugin.windows-x64-portable.zip
