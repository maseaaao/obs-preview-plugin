name: Bug report
description: Report a reproducible problem with OBS LAN Preview
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve OBS LAN Preview.
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: v0.2.1
    validations:
      required: true
  - type: input
    id: obs-version
    attributes:
      label: OBS Studio version
      placeholder: 32.1.2
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install the plugin
        2. Open Tools -> LAN Preview
        3. Enable preview
        4. Open the URL from another device
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant OBS logs, browser errors, or screenshots.
      render: text
